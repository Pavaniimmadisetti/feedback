<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Portal - CFMS</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page">
    <section id="admin-login" class="card panel" style="max-width:460px;margin:40px auto;">
      <h2>Admin Login</h2>
      <div class="grid">
        <input id="a-username" placeholder="Username" />
        <input id="a-password" type="password" placeholder="Password" />
        <button class="btn primary" id="a-login-btn">Login</button>
        <div id="a-login-msg" class="muted"></div>
      </div>
    </section>

    <section id="admin-app" class="hidden">
      <div class="topbar">
        <div>
          <h2>Admin Dashboard</h2>
          <small>Feedback Management System</small>
        </div>
        <div style="display:flex;gap:8px;">
          <button class="btn ghost" id="admin-refresh">Refresh</button>
          <button class="btn danger" id="a-logout-btn">Logout</button>
        </div>
      </div>

      <div class="grid cols-4" id="summary-cards"></div>

      <div class="tabs">
        <button class="tab active" data-tab="students">Students</button>
        <button class="tab" data-tab="faculty">Faculty</button>
        <button class="tab" data-tab="courses">Courses</button>
        <button class="tab" data-tab="forms">Forms</button>
      </div>

      <section id="tab-students" class="card panel"></section>
      <section id="tab-faculty" class="card panel hidden"></section>
      <section id="tab-courses" class="card panel hidden"></section>
      <section id="tab-forms" class="card panel hidden"></section>
    </section>
  </div>

  <script src="common.js"></script>
  <script src="admin.js"></script>
</body>
</html>
