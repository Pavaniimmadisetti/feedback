<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Portal - CFMS</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page">
    <section id="student-login" class="card panel" style="max-width:460px;margin:40px auto;">
      <h2>Student Login</h2>
      <p class="muted">Username = Registration Number, Password = DOB (YYYY-MM-DD) on first login.</p>
      <div class="grid">
        <input id="s-username" placeholder="Registration Number" />
        <input id="s-password" type="password" placeholder="Password" />
        <button class="btn primary" id="s-login-btn">Login</button>
        <div id="s-login-msg" class="muted"></div>
      </div>
    </section>

    <section id="student-app" class="hidden">
      <div class="topbar">
        <div>
          <h2 id="student-name">Student Dashboard</h2>
          <small id="student-meta"></small>
        </div>
        <div style="display:flex;gap:8px;">
          <button class="btn ghost" id="load-student-forms">Refresh</button>
          <button class="btn danger" id="s-logout-btn">Logout</button>
        </div>
      </div>

      <div class="tabs">
        <button class="tab active" data-filter="pending">Pending</button>
        <button class="tab" data-filter="completed">Completed</button>
      </div>
      <div style="margin-top:10px;max-width:260px;">
        <label for="feedback-type-filter"><strong>Feedback Type</strong></label>
        <select id="feedback-type-filter">
          <option value="all">All</option>
          <option value="faculty">Faculty Feedback</option>
          <option value="course">Course Feedback</option>
        </select>
      </div>

      <section class="card panel" style="margin-top:14px;">
        <h3>Student Details</h3>
        <div class="form-grid">
          <div><strong>Name:</strong> <span id="detail-name">-</span></div>
          <div><strong>Reg No:</strong> <span id="detail-regno">-</span></div>
          <div><strong>Email:</strong> <span id="detail-email">-</span></div>
          <div><strong>Semester:</strong> <span id="detail-semester">-</span></div>
          <div><strong>Section:</strong> <span id="detail-section">-</span></div>
        </div>
      </section>

      <section class="card panel" style="margin-top:14px;">
        <h3>Forms Summary</h3>
        <div class="form-grid">
          <div><strong>Total Forms:</strong> <span id="summary-total">0</span></div>
          <div><strong>Forms Filled:</strong> <span id="summary-completed">0</span></div>
          <div><strong>Pending:</strong> <span id="summary-pending">0</span></div>
        </div>
      </section>

      <section class="card panel" style="margin-top:14px;">
        <h3>Forms Filled By You</h3>
        <div id="filled-forms-list" class="grid">
          <small class="muted">No forms submitted yet.</small>
        </div>
      </section>

      <div id="student-forms"></div>

      <section class="card panel" style="margin-top:14px;">
        <h3>Change Password</h3>
        <div class="form-grid">
          <input id="current-password" type="password" placeholder="Current password" />
          <input id="new-password" type="password" placeholder="New password" />
        </div>
        <div style="margin-top:10px;display:flex;gap:8px;align-items:center;">
          <button class="btn primary" id="change-pass-btn">Update Password</button>
          <small id="pass-msg"></small>
        </div>
      </section>
    </section>
  </div>

  <script src="common.js"></script>
  <script src="student.js"></script>
</body>
</html>
