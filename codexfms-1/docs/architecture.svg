<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #0f172a; }
      .label { font: 600 16px Arial, sans-serif; fill: #0f172a; }
      .text { font: 14px Arial, sans-serif; fill: #1e293b; }
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 12; }
      .group { fill: #eef2ff; stroke: #6366f1; stroke-width: 2; rx: 14; }
      .arrow { stroke: #0f172a; stroke-width: 2.2; fill: none; marker-end: url(#m); }
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#0f172a"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1400" height="900" fill="#ffffff"/>
  <text x="40" y="50" class="title">College Feedback Management System - Architecture</text>

  <rect x="40" y="90" width="420" height="740" class="group"/>
  <text x="60" y="120" class="label">Frontend (Port 5500)</text>

  <rect x="70" y="150" width="360" height="90" class="box"/>
  <text x="90" y="185" class="label">Browser UI</text>
  <text x="90" y="210" class="text">Student Portal + Admin Portal</text>

  <rect x="70" y="270" width="360" height="120" class="box"/>
  <text x="90" y="305" class="label">Static Pages</text>
  <text x="90" y="330" class="text">index.html, student.html, admin.html</text>
  <text x="90" y="352" class="text">styles.css</text>

  <rect x="70" y="420" width="360" height="140" class="box"/>
  <text x="90" y="455" class="label">Client Scripts</text>
  <text x="90" y="480" class="text">student.js, admin.js</text>
  <text x="90" y="502" class="text">common.js (API client + cookie auth)</text>

  <rect x="70" y="590" width="360" height="210" class="box"/>
  <text x="90" y="625" class="label">User Flows</text>
  <text x="90" y="650" class="text">1. Login</text>
  <text x="90" y="672" class="text">2. Admin manages data/forms</text>
  <text x="90" y="694" class="text">3. Student views assigned forms</text>
  <text x="90" y="716" class="text">4. Student submits feedback</text>

  <rect x="500" y="90" width="520" height="740" class="group"/>
  <text x="520" y="120" class="label">Backend API (Node.js + Express, Port 3000)</text>

  <rect x="530" y="150" width="460" height="100" class="box"/>
  <text x="550" y="185" class="label">Routes</text>
  <text x="550" y="210" class="text">/auth, /admin/students, /admin/faculty, /admin/courses</text>
  <text x="550" y="232" class="text">/admin/forms, /student/forms, /students/me</text>

  <rect x="530" y="280" width="460" height="110" class="box"/>
  <text x="550" y="315" class="label">Middleware</text>
  <text x="550" y="340" class="text">CORS, cookie-parser, session middleware</text>
  <text x="550" y="362" class="text">requireAuth, requireRole, error handler</text>

  <rect x="530" y="420" width="460" height="120" class="box"/>
  <text x="550" y="455" class="label">Controllers + Services</text>
  <text x="550" y="480" class="text">Validation, business rules, form assignment logic</text>
  <text x="550" y="502" class="text">Faculty/Course feedback question selection</text>
  <text x="550" y="524" class="text">CSV bulk upload processing</text>

  <rect x="530" y="570" width="460" height="120" class="box"/>
  <text x="550" y="605" class="label">Models</text>
  <text x="550" y="630" class="text">Parameterized SQL queries (safe writes)</text>
  <text x="550" y="652" class="text">Targeting students by semester/section</text>
  <text x="550" y="674" class="text">Feedback responses + response status</text>

  <rect x="530" y="720" width="460" height="80" class="box"/>
  <text x="550" y="755" class="label">Security</text>
  <text x="550" y="778" class="text">bcrypt passwords, DB-backed sessions, role authorization</text>

  <rect x="1060" y="210" width="300" height="430" class="group"/>
  <text x="1080" y="240" class="label">MySQL Database (cfms)</text>

  <rect x="1090" y="270" width="240" height="340" class="box"/>
  <text x="1110" y="300" class="label">Core Tables</text>
  <text x="1110" y="326" class="text">admins</text>
  <text x="1110" y="348" class="text">students</text>
  <text x="1110" y="370" class="text">faculty</text>
  <text x="1110" y="392" class="text">courses</text>
  <text x="1110" y="414" class="text">forms (feedback_for)</text>
  <text x="1110" y="436" class="text">form_student_targets</text>
  <text x="1110" y="458" class="text">feedback_responses (q1-q35)</text>
  <text x="1110" y="480" class="text">sessions</text>

  <path d="M430 500 L500 500" class="arrow"/>
  <text x="438" y="488" class="text">REST + Cookies</text>

  <path d="M990 500 L1060 500" class="arrow"/>
  <text x="996" y="488" class="text">SQL</text>
</svg>
